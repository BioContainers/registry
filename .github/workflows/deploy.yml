name: deploy
on:
  push:
    branches: [main, master]
  schedule:
    - cron: "0 3 * * *"   # nightly rebuild (03:00 UTC) — data regenerated at deploy time
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install pipeline
        run: pip install ./pipeline
      - name: Clone data sources (shallow)
        run: |
          git clone --depth 1 --filter=blob:none https://github.com/bioconda/bioconda-recipes /tmp/bioconda-recipes
          git clone --depth 1 https://github.com/BioContainers/containers /tmp/containers
      - name: Build catalog (bioconda repodata + recipes + Dockerfiles)
        run: |
          python -m biocontainers_pipeline.cli build \
            --out data \
            --recipes-dir /tmp/bioconda-recipes/recipes \
            --containers-dir /tmp/containers \
            --repodata-cache /tmp/repodata
      - name: Build web
        working-directory: web
        run: |
          npm ci
          npm run build
      - name: Copy data into artifact
        run: cp -r data web/dist/data
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
